services:
  train-control:
    build:
      context: ./web-control
    image: model-railroad-web-control:latest
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      DCCEX_HOST: "${DCCEX_HOST:-192.168.4.22}"
      DCCEX_PORT: "${DCCEX_PORT:-2560}"
      DCCEX_MOCK: "${DCCEX_MOCK:-false}"
      SHARED_AUTH_DB: "${SHARED_AUTH_DB:-/app/data/shared-auth/auth.db}"
      HARDWARE_ARM_TOKEN: "${HARDWARE_ARM_TOKEN:-}"
      HARDWARE_ARM_TTL_MS: "${HARDWARE_ARM_TTL_MS:-900000}"
      HARDWARE_CONTROL_ALLOWLIST: "${HARDWARE_CONTROL_ALLOWLIST:-}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-}"
      CONTROL_TOKEN: "${CONTROL_TOKEN:-}"
      CONTROL_TOKEN_COMPAT_MODE: "${CONTROL_TOKEN_COMPAT_MODE:-false}"
      SESSION_DATA_DIR: "/app/data/sessions"
      SESSION_RETENTION_COUNT: "${SESSION_RETENTION_COUNT:-10}"
      SESSION_RETENTION_DAYS: "${SESSION_RETENTION_DAYS:-7}"
    volumes:
      - ./web-control/data:/app/data
